<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Français">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F2F2F7">
<title>Français — Conversational Core</title>
<style>
:root{
  --bg:#F2F2F7; --card:#FFFFFF; --track:#E3E3E8; --sep:rgba(60,60,67,.18);
  --label:#1C1C1E; --label2:#8E8E93; --label3:#C7C7CC; --tint:#007AFF;
  --cat-a:#F6A6A0; --cat-a-t:#BE3A30;  /* NUM   */
  --cat-b:#F7C58A; --cat-b-t:#A66400;  /* NOUN  */
  --cat-c:#A6D6A8; --cat-c-t:#2C7A4F;  /* VERB  */
  --cat-d:#9AD0DA; --cat-d-t:#237E8C;  /* PHRASE*/
  --cat-e:#B9B4E8; --cat-e-t:#5754B0;  /* WORD  */
  --p1:#4A86C2; --p2:#2F6AA8; --p3:#1C4E8B; --p4:#0C3568;
  --green:#34C759; --green-bg:#E8F8EC; --green-bd:#C4E0CD; --green-tx:#1B7A33;
  --red:#FF3B30;
  --sf:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display',system-ui,'Segoe UI',Roboto,sans-serif;
  --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--label);font-family:var(--sf);-webkit-font-smoothing:antialiased;line-height:1.4;overscroll-behavior-y:none;padding-bottom:calc(28px + var(--sab))}
button{font-family:inherit;color:inherit;border:0;background:none;cursor:pointer}
.wrap{max-width:520px;margin:0 auto}
.pad{padding:0 16px}

/* nav */
.ios-top{position:sticky;top:0;z-index:50;padding:calc(var(--sat) + 14px) 16px 10px;background:rgba(242,242,247,.86);backdrop-filter:saturate(160%) blur(14px);-webkit-backdrop-filter:saturate(160%) blur(14px);border-bottom:1px solid var(--sep)}
.ios-title{font-size:28px;font-weight:700;letter-spacing:-.02em;margin:0;line-height:1}
.ios-kick{display:block;font-size:12px;font-weight:600;color:var(--label2);letter-spacing:.02em;margin-top:3px}
.ios-seg{display:flex;background:rgba(118,118,128,.12);border-radius:9px;padding:2px;margin-top:12px}
.ios-seg button{flex:1;font-size:13px;font-weight:600;color:var(--label);padding:7px 0;border-radius:7px}
.ios-seg button.on{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.12),0 1px 1px rgba(0,0,0,.04)}

/* progress */
.prog-h{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--label2);margin:16px 2px 8px}
.prog-h b{color:var(--label);font-weight:600;font-variant-numeric:tabular-nums}
.ios-pbar{position:relative;height:10px;border-radius:6px;overflow:hidden;background:linear-gradient(90deg,var(--p1) 0,var(--p1) 25%,var(--p2) 25%,var(--p2) 50%,var(--p3) 50%,var(--p3) 75%,var(--p4) 75%,var(--p4) 100%)}
.ios-pmask{position:absolute;top:0;right:0;bottom:0;background:var(--track);transition:width .3s ease}

/* selectors */
.lab{font-size:12px;font-weight:600;color:var(--label2);text-transform:uppercase;letter-spacing:.06em;margin:20px 2px 8px}
.weeks{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px;scrollbar-width:none}
.weeks::-webkit-scrollbar{display:none}
.wk{flex:0 0 auto;width:56px;height:60px;border-radius:14px;background:#fff;border:1px solid var(--sep);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.wk .n{font-size:17px;font-weight:600;font-variant-numeric:tabular-nums}
.wk .d{font-size:9.5px;color:var(--label2);font-variant-numeric:tabular-nums}
.wk .dot{width:16px;height:3px;border-radius:2px}
.wk.sel{border-color:transparent;color:#fff}
.wk.sel .d{color:rgba(255,255,255,.85)}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin:14px 0 18px}
.dtab{border-radius:11px;background:#fff;border:1px solid var(--sep);padding:8px 1px;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;min-height:46px;justify-content:center}
.dtab .dn{font-size:14px;font-weight:600}
.dtab .dl{font-size:8px;color:var(--label2);text-transform:uppercase;letter-spacing:.02em;line-height:1}
.dtab.sel{background:var(--label);border-color:transparent}
.dtab.sel .dn{color:#fff}.dtab.sel .dl{color:rgba(255,255,255,.8)}
.dtab .fin{position:absolute;top:3px;right:4px;width:12px;height:12px;border-radius:50%;background:var(--green);color:#fff;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700}

/* card */
.ios-card{background:var(--card);border:1px solid var(--sep);border-radius:18px;padding:15px;margin-bottom:14px}
.ios-card.done{background:var(--green-bg);border-color:var(--green-bd)}
.whead{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.whead .t{font-size:21px;font-weight:700;letter-spacing:-.01em}
.whead .s{font-size:12.5px;color:var(--label2);margin-top:4px}
.ios-pill{font-size:11px;font-weight:600;color:#fff;padding:5px 10px;border-radius:20px;white-space:nowrap}
.tip{font-size:13px;color:var(--label2);margin:10px 1px 2px;line-height:1.45}
.note{font-size:14px;color:var(--label);background:rgba(118,118,128,.08);border-radius:12px;padding:11px 13px;margin:12px 0 2px;line-height:1.5;font-style:italic}
.btn{display:block;width:100%;background:var(--tint);color:#fff;font-size:16px;font-weight:600;padding:13px;border-radius:13px;margin:14px 0 4px;text-align:center}
.btn.sec{background:rgba(118,118,128,.12);color:var(--tint)}
.btn.greenbtn{background:var(--green)}
.metaline{font-size:12.5px;color:var(--label2);margin:12px 1px 2px;display:flex;justify-content:space-between;align-items:center;font-variant-numeric:tabular-nums}

/* list rows */
.ios-row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:12px 2px;position:relative}
.ios-row + .ios-row::before{content:'';position:absolute;left:19px;right:0;top:0;height:.5px;background:var(--sep)}
.ios-line{width:5px;height:30px;border-radius:3px;flex:0 0 auto}
.ios-mid{flex:1;min-width:0}
.ios-name{font-size:15px;font-weight:500;line-height:1.25}
.ios-en{font-size:12.5px;color:var(--label2);margin-top:1px}
.ios-cat{font-size:10px;font-weight:600;letter-spacing:.03em;margin-left:7px;white-space:nowrap;vertical-align:middle}
.spk{width:30px;height:30px;border-radius:50%;background:rgba(0,122,255,.10);flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.spk svg{width:15px;height:15px;fill:var(--tint)}

/* footer / settings */
.foot{font-size:13px;color:var(--label2);text-align:center;margin:6px 2px 0;line-height:1.5}
.disc summary{font-size:14px;font-weight:600;list-style:none;padding:4px 0;cursor:pointer}
.disc summary::-webkit-details-marker{display:none}
.disc .row2{display:flex;gap:8px;margin-top:10px}
.disc .row2 .btn{margin:0;font-size:14px;padding:11px}

/* runner overlay */
.run{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;padding:calc(var(--sat) + 10px) 16px calc(20px + var(--sab))}
.run.show{display:flex}
.run .top{display:flex;align-items:center;gap:12px}
.run .x{font-size:17px;color:var(--tint);font-weight:600;padding:4px 2px}
.run .rprog{flex:1;font-size:13px;color:var(--label2);font-weight:600;text-align:center;font-variant-numeric:tabular-nums}
.run .rbar{height:4px;border-radius:3px;background:var(--track);overflow:hidden;margin:10px 0 0}
.run .rbar i{display:block;height:100%;background:var(--tint);transition:width .25s}
.fc{flex:1;display:flex;flex-direction:column;justify-content:center}
.fc .cat{font-size:11px;font-weight:700;letter-spacing:.05em}
.fc .fr{font-size:32px;font-weight:700;letter-spacing:-.01em;line-height:1.15}
.fc .en{font-size:21px;font-weight:500;color:var(--label)}
.fc .ennote{font-size:14px;color:var(--label2);margin-top:-6px}
.fc .hint{font-size:12.5px;color:var(--label3);font-weight:600}
.fc .bigspk{width:54px;height:54px;border-radius:50%;background:rgba(0,122,255,.10);display:flex;align-items:center;justify-content:center}
.fc .bigspk svg{width:24px;height:24px;fill:var(--tint)}
.fccard{width:100%;background:#fff;border:1px solid var(--sep);border-radius:20px;padding:34px 18px;min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center}
.rate{display:flex;gap:10px;margin-top:14px}
.rate button{flex:1;font-size:16px;font-weight:600;padding:15px;border-radius:14px}
.rate .again{background:rgba(255,59,48,.12);color:var(--red)}
.rate .good{background:var(--green);color:#fff}
.done-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px}
.done-screen .big{font-size:46px}
.done-screen .h{font-size:23px;font-weight:700}
.done-screen .sub{font-size:14px;color:var(--label2)}
.empty{text-align:center;color:var(--label2);font-size:15px;padding:30px 10px;line-height:1.6}
.empty .big{font-size:40px;margin-bottom:6px}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="ios-top wrap">
  <h1 class="ios-title">Français</h1>
  <span class="ios-kick" id="kicker">Conversational core</span>
  <div class="ios-seg">
    <button id="seg-learn" class="on" onclick="setMode('learn')">Learn</button>
    <button id="seg-review" onclick="setMode('review')">Review</button>
  </div>
</div>

<div class="wrap pad">
  <!-- LEARN -->
  <div id="view-learn">
    <div class="prog-h"><span>Course progress</span><b id="progtxt">0%</b></div>
    <div class="ios-pbar"><div class="ios-pmask" id="pmask" style="width:100%"></div></div>
    <div class="lab">Week</div>
    <div class="weeks" id="weeks"></div>
    <div class="days" id="days"></div>
    <div id="lesson"></div>

    <details class="disc ios-card">
      <summary>Progress &amp; backup</summary>
      <div class="metaline"><span id="stat-days">0 / 112 lessons</span><span id="stat-items">0 / 961 words</span></div>
      <label class="metaline" style="cursor:pointer"><span>Auto-play audio</span><input type="checkbox" id="autoaud" checked onchange="toggleAuto()"></label>
      <div class="row2">
        <button class="btn sec" onclick="exportData()">Export</button>
        <button class="btn sec" onclick="document.getElementById('imp').click()">Import</button>
      </div>
      <input type="file" id="imp" accept="application/json" style="display:none" onchange="importData(event)">
      <button class="btn sec" style="margin-top:8px;color:var(--red)" onclick="resetData()">Reset all progress</button>
      <p class="foot" style="margin-top:12px">Progress is saved on this device. Export now and then to keep a backup. Audio uses your device's built-in French voice.</p>
    </details>
  </div>

  <!-- REVIEW -->
  <div id="view-review" style="display:none">
    <div id="review-body"></div>
  </div>
</div>

<!-- RUNNER -->
<div class="run" id="run">
  <div class="top">
    <button class="x" onclick="closeRun()">Close</button>
    <span class="rprog" id="rprog">1 / 10</span>
    <span style="width:44px"></span>
  </div>
  <div class="rbar"><i id="rbar" style="width:0%"></i></div>
  <div id="run-body" style="flex:1;display:flex;flex-direction:column"></div>
</div>

<script src="curriculum.js"></script>
<script>
const SPK='<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 3.2v2.1a7 7 0 0 1 0 13.4v2.1A9 9 0 0 0 14 3.2z"/></svg>';
const CAT={NUM:['--cat-a','--cat-a-t'],NOUN:['--cat-b','--cat-b-t'],VERB:['--cat-c','--cat-c-t'],PHRASE:['--cat-d','--cat-d-t'],WORD:['--cat-e','--cat-e-t']};

const KEY='fr_course_v1';
let S={done:{},srs:{},auto:true,streak:0,lastDay:null};
function load(){try{const r=localStorage.getItem(KEY);if(r)S=Object.assign(S,JSON.parse(r));}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
load();

const C=window.CURRICULUM;
const todayStr=()=>new Date().toISOString().slice(0,10);
const dayKey=(w,d)=>w+'-'+d;
function eachDay(fn){C.blocks.forEach(b=>b.weeks.forEach(w=>w.days.forEach(d=>fn(b,w,d))));}
function learnItems(){let a=[];eachDay((b,w,d)=>{if(d.type=='learn')a=a.concat(d.items);});return a;}
function weekItems(wn){let a=[];C.blocks.forEach(b=>b.weeks.forEach(w=>{if(w.n==wn)w.days.forEach(d=>{if(d.type=='learn')a=a.concat(d.items);});}));return a;}
function blockItems(wn){let out=[];C.blocks.forEach(b=>{if(b.weeks.some(w=>w.n==wn))b.weeks.forEach(w=>w.days.forEach(d=>{if(d.type=='learn')out=out.concat(d.items);}));});return out;}
function allItems(){return learnItems();}

let cur={w:1,d:1};
let mode='learn';

/* audio */
let frVoice=null;
function pickVoice(){try{const vs=speechSynthesis.getVoices();frVoice=vs.find(v=>/^fr(-|_)?/i.test(v.lang))||vs.find(v=>/fran/i.test(v.name))||null;}catch(e){}}
if('speechSynthesis' in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function speak(t){if(!('speechSynthesis' in window))return;try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='fr-FR';if(frVoice)u.voice=frVoice;u.rate=.92;speechSynthesis.speak(u);}catch(e){}}

function splitEn(en){const m=en.match(/^(.*?)\s*\*\(?(.+?)\)?\*\s*$/);if(m)return[m[1].trim(),m[2].trim()];return[en,''];}

function statsCalc(){let days=0,total=0;eachDay((b,w,d)=>{total++;if(S.done[dayKey(w.n,d.n)])days++;});return{days,total,learned:Object.keys(S.srs).length,allItems:C.meta.totalItems};}
function boxOf(id){return S.srs[id]?S.srs[id].box:0;}
function blockColorOf(wn){let c='--p1';C.blocks.forEach(b=>{if(b.weeks.some(w=>w.n==wn))c=b.color;});return c;}
function weekDoneFrac(wn){let done=0,tot=0;C.blocks.forEach(b=>b.weeks.forEach(w=>{if(w.n==wn)w.days.forEach(d=>{tot++;if(S.done[dayKey(w.n,d.n)])done++;});}));return done+'/'+tot;}
function curWeekObj(){let r=null;C.blocks.forEach(b=>b.weeks.forEach(w=>{if(w.n==cur.w)r=w;}));return r;}
function curDayObj(){const w=curWeekObj();return w.days.find(d=>d.n==cur.d);}

function renderWeeks(){
  const el=document.getElementById('weeks');el.innerHTML='';
  C.blocks.forEach(b=>b.weeks.forEach(w=>{
    const c=b.color, sel=(w.n==cur.w);
    const div=document.createElement('div');
    div.className='wk'+(sel?' sel':'');
    if(sel)div.style.background='var('+c+')';
    div.innerHTML='<span class="n">'+w.n+'</span><span class="d">'+weekDoneFrac(w.n)+'</span><span class="dot" style="background:'+(sel?'#fff':'var('+c+')')+'"></span>';
    div.onclick=()=>{cur={w:w.n,d:1};renderLearn();};
    el.appendChild(div);
  }));
  const sel=el.querySelector('.sel');if(sel)sel.scrollIntoView({inline:'center',block:'nearest'});
}
function dayTabLabel(d){return ({focus:'focus',summary:'recap',checkpoint:'check',final:'final'})[d.type] || (d.focus?'focus':'');}
function renderDays(){
  const el=document.getElementById('days');el.innerHTML='';
  const w=curWeekObj();
  w.days.forEach(d=>{
    const sel=(d.n==cur.d), done=S.done[dayKey(w.n,d.n)];
    const div=document.createElement('div');
    div.className='dtab'+(sel?' sel':'');
    div.innerHTML='<span class="dn">'+d.n+'</span><span class="dl">'+dayTabLabel(d)+'</span>'+(done?'<span class="fin">&#10003;</span>':'');
    div.onclick=()=>{cur.d=d.n;renderLearn();};
    el.appendChild(div);
  });
}
function dayTitle(d){return d.focus?('Focus \u2014 '+d.focus):d.title;}
function daySub(d,w){return d.focus?('\u201c'+d.focusGloss+'\u201d  \u00b7  Week '+w.n):('Week '+w.n+' \u00b7 '+w.title);}
function pillFor(d){
  if(d.type=='summary')return['Recap'];
  if(d.type=='checkpoint')return['Checkpoint'];
  if(d.type=='final')return['Final'];
  if(d.focus)return['Focus'];
  return['Day '+d.n];
}
function deckForDay(d,w){
  if(d.type=='learn')return d.items.slice();
  let pool=d.type=='summary'?weekItems(w.n):(d.type=='checkpoint'?blockItems(w.n):allItems());
  const cap=d.type=='summary'?20:(d.type=='checkpoint'?24:30);
  pool=pool.slice().sort((a,b)=>boxOf(a.id)-boxOf(b.id)||Math.random()-.5);
  return pool.slice(0,Math.min(cap,pool.length));
}
function renderLesson(){
  const w=curWeekObj(), d=curDayObj(), key=dayKey(w.n,d.n), done=S.done[key];
  const pillTxt=pillFor(d)[0], pillCol=blockColorOf(cur.w);
  const deck=deckForDay(d,w);
  let h='<div class="ios-card'+(done?' done':'')+'">';
  h+='<div class="whead"><div><div class="t">'+dayTitle(d)+'</div><div class="s">'+daySub(d,w)+'</div></div>';
  h+='<span class="ios-pill" style="background:'+(done?'var(--green)':'var('+pillCol+')')+'">'+(done?'&#10003; Done':pillTxt)+'</span></div>';
  if(d.tip)h+='<div class="tip">'+d.tip.replace(/`/g,'')+'</div>';
  if(d.note)h+='<div class="note">'+d.note+'</div>';
  const verb=d.type=='learn'?'lesson':(d.type=='summary'?'recap':(d.type=='checkpoint'?'checkpoint':'review'));
  h+='<button class="btn" onclick="startRun('+w.n+','+d.n+')">'+(done?'Practise again':'Start '+verb)+' &middot; '+deck.length+' cards</button>';
  if(d.type=='learn'){
    h+='<div style="margin-top:6px">';
    d.items.forEach(it=>{
      const cv=CAT[it.cat][0], ct=CAT[it.cat][1], mn=splitEn(it.en)[0];
      h+='<div class="ios-row"><span class="ios-line" style="background:var('+cv+')"></span>'
        +'<span class="ios-mid"><span class="ios-name">'+it.fr+'<span class="ios-cat" style="color:var('+ct+')">'+it.cat+'</span></span>'
        +'<span class="ios-en">'+mn+'</span></span>'
        +'<button class="spk" data-say="'+it.say.replace(/"/g,'&quot;')+'">'+SPK+'</button></div>';
    });
    h+='</div>';
  }
  h+='</div>';
  const wrap=document.getElementById('lesson');wrap.innerHTML=h;
  wrap.querySelectorAll('.spk').forEach(b=>b.onclick=()=>speak(b.getAttribute('data-say')));
}
function renderProgress(){
  const st=statsCalc(), pct=Math.round(st.learned/st.allItems*100);
  document.getElementById('pmask').style.width=(100-pct)+'%';
  document.getElementById('progtxt').textContent=pct+'% \u00b7 '+st.learned+'/'+st.allItems+' words';
  document.getElementById('stat-days').textContent=st.days+' / '+st.total+' lessons';
  document.getElementById('stat-items').textContent=st.learned+' / '+st.allItems+' words';
  document.getElementById('kicker').textContent=(S.streak>1)?(S.streak+'-day streak \u00b7 keep going'):'Conversational core';
}
function renderLearn(){renderWeeks();renderDays();renderLesson();renderProgress();}

function dueItems(){const t=todayStr();const map={};learnItems().forEach(it=>map[it.id]=it);const out=[];Object.keys(S.srs).forEach(id=>{if(S.srs[id].due<=t&&map[id])out.push(map[id]);});return out.sort((a,b)=>boxOf(a.id)-boxOf(b.id));}
function renderReview(){
  const due=dueItems(), body=document.getElementById('review-body');
  if(due.length===0){body.innerHTML='<div class="ios-card" style="margin-top:18px"><div class="empty"><div class="big">&#10003;</div>All caught up.<br>No cards are due right now.<br><span style="font-size:13px">Come back after your next lesson, or keep learning new words.</span></div></div>';return;}
  body.innerHTML='<div class="ios-card" style="margin-top:18px"><div class="whead"><div><div class="t">Daily review</div><div class="s">Spaced repetition \u00b7 weakest words first</div></div><span class="ios-pill" style="background:var(--p2)">'+due.length+' due</span></div><button class="btn" onclick="startReview()">Review '+Math.min(due.length,30)+' cards</button></div>';
}
function setMode(m){mode=m;document.getElementById('seg-learn').classList.toggle('on',m=='learn');document.getElementById('seg-review').classList.toggle('on',m=='review');document.getElementById('view-learn').style.display=m=='learn'?'':'none';document.getElementById('view-review').style.display=m=='review'?'':'none';if(m=='review')renderReview();}

const IV=[0,1,2,4,8,16];
function rate(id,good){let box=boxOf(id);box=good?Math.min(box+1,5):1;const due=new Date(Date.now()+IV[box]*86400000).toISOString().slice(0,10);S.srs[id]={box,due:good?due:todayStr()};}

let run={deck:[],i:0,flip:false,good:0,markKey:null,review:false};
function startRun(wn,dn){const w=curWeekObj();const d=w.days.find(x=>x.n==dn);run={deck:deckForDay(d,w),i:0,flip:false,good:0,markKey:dayKey(wn,dn),review:false};openRun();}
function startReview(){run={deck:dueItems().slice(0,30),i:0,flip:false,good:0,markKey:null,review:true};openRun();}
function openRun(){document.getElementById('run').classList.add('show');drawCard();}
function closeRun(){document.getElementById('run').classList.remove('show');try{speechSynthesis.cancel();}catch(e){}if(mode=='review')renderReview();else renderLearn();}
function drawCard(){
  const body=document.getElementById('run-body');
  if(run.i>=run.deck.length)return finishRun();
  const it=run.deck[run.i];run.flip=false;
  document.getElementById('rprog').textContent=(run.i+1)+' / '+run.deck.length;
  document.getElementById('rbar').style.width=(run.i/run.deck.length*100)+'%';
  const ct=CAT[it.cat][1], parts=splitEn(it.en), mn=parts[0], nt=parts[1];
  body.innerHTML='<div class="fc"><div class="fccard" id="fcard">'
    +'<span class="cat" style="color:var('+ct+')">'+it.cat+'</span>'
    +'<span class="fr">'+it.fr+'</span>'
    +'<button class="bigspk" id="bigspk">'+SPK+'</button>'
    +'<span class="hint" id="hint">tap card to reveal</span>'
    +'<span class="en" id="en" style="display:none">'+mn+'</span>'
    +(nt?'<span class="ennote" id="ennote" style="display:none">'+nt+'</span>':'')
    +'</div>'
    +'<div class="rate" id="rate" style="display:none">'
    +'<button class="again" onclick="answer(false)">Again</button>'
    +'<button class="good" onclick="answer(true)">Got it</button></div></div>';
  document.getElementById('fcard').onclick=flipCard;
  document.getElementById('bigspk').onclick=(e)=>{e.stopPropagation();speak(it.say);};
  if(S.auto)speak(it.say);
}
function flipCard(){if(run.flip)return;run.flip=true;document.getElementById('hint').style.display='none';document.getElementById('en').style.display='';const en=document.getElementById('ennote');if(en)en.style.display='';document.getElementById('rate').style.display='';}
function answer(good){const it=run.deck[run.i];rate(it.id,good);if(good)run.good++;save();run.i++;drawCard();}
function finishRun(){
  document.getElementById('rbar').style.width='100%';document.getElementById('rprog').textContent=run.deck.length+' / '+run.deck.length;
  if(run.markKey){S.done[run.markKey]=true;updateStreak();save();}
  document.getElementById('run-body').innerHTML='<div class="done-screen"><div class="big">&#127881;</div><div class="h">'+(run.review?'Review complete':'Lesson complete')+'</div><div class="sub">'+run.good+' of '+run.deck.length+' got first time</div><button class="btn greenbtn" style="max-width:240px;margin-top:18px" onclick="closeRun()">Done</button></div>';
}
function updateStreak(){const t=todayStr();if(S.lastDay===t)return;const y=new Date(Date.now()-86400000).toISOString().slice(0,10);S.streak=(S.lastDay===y)?(S.streak||0)+1:1;S.lastDay=t;}

function toggleAuto(){S.auto=document.getElementById('autoaud').checked;save();}
function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='francais-progress-'+todayStr()+'.json';a.click();}
function importData(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{S=Object.assign(S,JSON.parse(r.result));save();autoContext();renderLearn();alert('Progress imported.');}catch(e){alert('Could not read that file.');}};r.readAsText(f);}
function resetData(){if(confirm('Erase all progress on this device? This cannot be undone.')){S={done:{},srs:{},auto:S.auto,streak:0,lastDay:null};save();autoContext();renderLearn();}}

function autoContext(){let found=null;C.blocks.forEach(b=>b.weeks.forEach(w=>w.days.forEach(d=>{if(!found&&!S.done[dayKey(w.n,d.n)])found={w:w.n,d:d.n};})));cur=found||{w:16,d:7};}

document.getElementById('autoaud').checked=S.auto!==false;
autoContext();
renderLearn();
</script>
</body>
</html>
